name: Generate .d.ts

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    name: Generate .d.ts

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      - name: Install dependencies
        run: npm install

      # The previously generated files must be removed, otherwise tsc refuses
      # to overwrite them once they get pulled into the program via imports.
      # The hand-maintained resources/wa/index.d.ts must be kept — it shadows
      # the data files out of the program.
      - name: Remove previously generated typedefs
        run: rm -f index.d.ts index.d.ts.map src/WaCalculator.d.ts src/WaCalculator.d.ts.map

      - name: Run typescript
        run: npx tsc

      - name: Commit typedefs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update coef exports
          file_pattern: "*.d.ts *.d.ts.map"
